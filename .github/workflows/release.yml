name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runs-on: ubuntu-latest
            binary: run-on-business-day
          - os: linux
            arch: arm64
            runs-on: ubuntu-latest
            binary: run-on-business-day-arm64
          - os: windows
            arch: amd64
            runs-on: ubuntu-latest
            binary: run-on-business-day.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Download latest holiday CSV
        run: |
          curl -L "https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv" \
            -o syukujitsu.csv

      - name: Generate syukujitsu_data.go
        run: go run tools/csv2go/main.go

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/${{ matrix.binary }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create Release & Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries
        run: |
          mkdir -p dist
          cp artifacts/binary-linux-amd64/run-on-business-day dist/
          cp artifacts/binary-linux-arm64/run-on-business-day-arm64 dist/
          cp artifacts/binary-windows-amd64/run-on-business-day.exe dist/
          ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            dist/run-on-business-day \
            dist/run-on-business-day-arm64 \
            dist/run-on-business-day.exe \
            --title "Release $TAG" \
            --notes "Automated build for $TAG"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm package versions
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"  # Remove 'v' prefix (v2027.0.0 -> 2027.0.0)

          # Update main package
          npm version "$VERSION" --prefix npm/run-on-business-day --no-git-tag-version

          # Update platform packages
          npm version "$VERSION" --prefix npm/linux-x64 --no-git-tag-version
          npm version "$VERSION" --prefix npm/linux-arm64 --no-git-tag-version
          npm version "$VERSION" --prefix npm/win32-x64 --no-git-tag-version

      - name: Prepare binaries for npm packages
        run: |
          # linux-x64
          mkdir -p npm/linux-x64/bin
          cp dist/run-on-business-day npm/linux-x64/bin/run-on-business-day
          chmod +x npm/linux-x64/bin/run-on-business-day

          # linux-arm64
          mkdir -p npm/linux-arm64/bin
          cp dist/run-on-business-day-arm64 npm/linux-arm64/bin/run-on-business-day
          chmod +x npm/linux-arm64/bin/run-on-business-day

          # win32-x64
          mkdir -p npm/win32-x64/bin
          cp dist/run-on-business-day.exe npm/win32-x64/bin/run-on-business-day.exe

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/linux-x64 && npm publish --access public && cd ../..
          cd npm/linux-arm64 && npm publish --access public && cd ../..
          cd npm/win32-x64 && npm publish --access public && cd ../..
          cd npm/run-on-business-day && npm publish --access public && cd ../..
