name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runs-on: ubuntu-latest
            binary: run-on-business-day
            npm-dir: linux-x64
          - os: linux
            arch: arm64
            runs-on: ubuntu-latest
            binary: run-on-business-day-arm64
            npm-dir: linux-arm64
          - os: windows
            arch: amd64
            runs-on: ubuntu-latest
            binary: run-on-business-day.exe
            npm-dir: win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Download latest holiday CSV
        run: |
          curl -L "https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv" \
            -o syukujitsu.csv

      - name: Generate syukujitsu_data.go
        run: go run tools/csv2go/main.go

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/${{ matrix.binary }}" .

      - name: Copy binary to npm directory
        run: |
          mkdir -p npm/${{ matrix.npm-dir }}/bin
          cp dist/${{ matrix.binary }} npm/${{ matrix.npm-dir }}/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.npm-dir }}
          path: npm/${{ matrix.npm-dir }}/
          retention-days: 1

  release:
    name: Create Release & Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Clear npm config
        run: |
          rm -f ~/.npmrc
          npm config set registry https://registry.npmjs.org/

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries and npm packages
        run: |
          mkdir -p dist
          cp artifacts/binary-linux-amd64/run-on-business-day dist/
          cp artifacts/binary-linux-arm64/run-on-business-day-arm64 dist/
          cp artifacts/binary-windows-amd64/run-on-business-day.exe dist/

          # Restore npm package structures with binaries
          cp -r artifacts/npm-linux-x64 npm/linux-x64
          cp -r artifacts/npm-linux-arm64 npm/linux-arm64
          cp -r artifacts/npm-win32-x64 npm/win32-x64

          ls -la dist/

      - name: Publish to npm
        run: |
          npm publish npm/linux-x64 --access public --provenance
          npm publish npm/linux-arm64 --access public --provenance
          npm publish npm/win32-x64 --access public --provenance
          npm publish npm/run-on-business-day --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            dist/run-on-business-day \
            dist/run-on-business-day-arm64 \
            dist/run-on-business-day.exe \
            --title "Release $TAG" \
            --notes "Automated build for $TAG"

