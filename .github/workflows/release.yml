name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            binary: run-on-business-day-linux-amd64
          - os: linux
            arch: arm64
            binary: run-on-business-day-linux-arm64
          - os: windows
            arch: amd64
            binary: run-on-business-day-windows-amd64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download latest holiday CSV
        run: |
          curl -L "https://www8.cao.go.jp/chosei/shukujitsu/syukujitsu.csv" \
            -o syukujitsu.csv

      - name: Generate syukujitsu_data.go
        run: go run tools/csv2go/main.go

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${{ matrix.binary }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            artifacts/binary-linux-amd64/run-on-business-day-linux-amd64 \
            artifacts/binary-linux-arm64/run-on-business-day-linux-arm64 \
            artifacts/binary-windows-amd64/run-on-business-day-windows-amd64.exe \
            --title "Release $TAG" \
            --notes "Automated build for $TAG"
